name: docker
description: Build and (optionally) push the container image to GHCR.

inputs:
  image:
    description: Image name to build.
    required: false
    default: ghcr.io/${{ github.repository }}
  version:
    description: Version tag to apply (e.g. from semantic-release).
    required: true
  gh-token:
    description: Token used to log in to GHCR.
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

    - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.gh-token }}

    - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        push: true
        tags: |
          ${{ inputs.image }}:${{ inputs.version }}
          ${{ inputs.image }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
