name: docker
description: Build and (optionally) push the container image to GHCR.

inputs:
  image:
    description: Image name to build.
    required: false
    default: ghcr.io/${{ github.repository }}
  version:
    description: Version tag to apply (e.g. from semantic-release).
    required: true
  gh-token:
    description: Token used to log in to GHCR.
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.gh-token }}

    - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        push: true
        tags: |
          ${{ inputs.image }}:${{ inputs.version }}
          ${{ inputs.image }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
